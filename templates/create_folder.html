{% extends "base.html" %}

{% block title %}Create Folder - {{ event.title }}{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="fas fa-folder-plus"></i> Create New Folder</h3>
                </div>
                <div class="card-body">
                    <h4>{{ event.title }}</h4>
                    <p class="text-muted">
                        <i class="fas fa-calendar"></i> {{ event.date.strftime('%B %d, %Y') }} | 
                        <i class="fas fa-map-marker-alt"></i> {{ event.venue }}
                    </p>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="folder_name" class="form-label">
                                <i class="fas fa-folder"></i> Folder Name
                            </label>
                            <input type="text" class="form-control" id="folder_name" name="folder_name" 
                                   placeholder="e.g., Event Highlights, Group Photos" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-plus"></i> Create Folder
                            </button>
                            <a href="{{ url_for('event_folders', event_id=event.id) }}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
