{% extends "base.html" %}

{% block title %}Edit Event{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-warning">
                    <h3 class="mb-0"><i class="fas fa-edit"></i> Edit Event</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('edit_event', event_id=event.id) }}">
                        <div class="mb-3">
                            <label for="title" class="form-label">
                                <i class="fas fa-heading"></i> Event Title <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ event.title }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">
                                <i class="fas fa-align-left"></i> Description <span class="text-danger">*</span>
                            </label>
                            <textarea class="form-control" id="description" name="description" rows="5" required>{{ event.description }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="date" class="form-label">
                                        <i class="fas fa-calendar"></i> Date & Time <span class="text-danger">*</span>
                                    </label>
                                    <input type="datetime-local" class="form-control" id="date" name="date" 
                                           value="{{ event.date.strftime('%Y-%m-%dT%H:%M') }}" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="capacity" class="form-label">
                                        <i class="fas fa-users"></i> Capacity <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" class="form-control" id="capacity" name="capacity" 
                                           value="{{ event.capacity }}" min="1" required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="venue" class="form-label">
                                <i class="fas fa-map-marker-alt"></i> Venue <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="venue" name="venue" value="{{ event.venue }}" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="fas fa-save"></i> Update Event
                            </button>
                            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
